version: "3.9"

# =============================================================================
# v13 — adds Marquez (API + Web) + OpenLineage wiring to the v12 stack
# =============================================================================

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
  AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  # MLflow
  MLFLOW_TRACKING_URI: http://mlflow:5000
  # OpenLineage / Marquez
  OPENLINEAGE_URL: http://marquez:5000
  OPENLINEAGE_NAMESPACE: football_pipeline
  MARQUEZ_URL: http://marquez:5000
  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

x-airflow-volumes: &airflow-volumes
  - ./dags:/opt/airflow/dags
  - ./plugins:/opt/airflow/plugins
  - ./logs:/opt/airflow/logs

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Airflow Postgres
  # ---------------------------------------------------------------------------

  postgres-airflow:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application Postgres (matches + marts)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Marquez Postgres (lineage metadata)
  # ---------------------------------------------------------------------------

  marquez-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Marquez API
  # ---------------------------------------------------------------------------

  marquez:
    image: marquezproject/marquez:latest
    depends_on:
      marquez-db:
        condition: service_healthy
    ports:
      - "5002:5000"   # API  → http://localhost:5002/api/v1/lineage
      - "5003:5001"   # Admin
    volumes:
      - ./config/marquez.yml:/usr/src/app/marquez.yml
    command: ["--config", "/usr/src/app/marquez.yml"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/v1/namespaces || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Marquez Web UI
  # ---------------------------------------------------------------------------

  marquez-web:
    image: marquezproject/marquez-web:latest
    depends_on:
      marquez:
        condition: service_healthy
    ports:
      - "3001:3000"   # UI → http://localhost:3001
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000

  # ---------------------------------------------------------------------------
  # MLflow
  # ---------------------------------------------------------------------------

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5001:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --backend-store-uri /mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Prometheus + Grafana
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command: ["--config.file=/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning

  # ---------------------------------------------------------------------------
  # Airflow
  # ---------------------------------------------------------------------------

  airflow-init:
    image: apache/airflow:2.9.0-python3.11
    depends_on:
      postgres-airflow:
        condition: service_healthy
    environment:
      <<: *airflow-env
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    volumes: *airflow-volumes

  airflow-webserver:
    image: apache/airflow:2.9.0-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
    command: webserver
    volumes: *airflow-volumes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    image: apache/airflow:2.9.0-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: scheduler
    volumes: *airflow-volumes

volumes:
  postgres-airflow-data:
  postgres-data:
  marquez-db-data:
  mlflow-data:
  grafana-data:
