---
# football-pipeline-v7 docker-compose
# Changes vs v6:
#   - football-db removed (replaced by RDS — set FOOTBALL_DB_HOST to RDS endpoint)
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / S3_BUCKET_NAME added to env
#   - SPARK_JARS now includes hadoop-aws + aws-java-sdk-bundle
#   - moto-server service added for local S3 testing without hitting real AWS

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.12
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""

    # Kafka
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    # Postgres → RDS in production; override with RDS endpoint after `terraform apply`
    FOOTBALL_DB_HOST:     ${FOOTBALL_DB_HOST:-localhost}
    FOOTBALL_DB_PORT:     ${FOOTBALL_DB_PORT:-5432}
    FOOTBALL_DB_NAME:     ${FOOTBALL_DB_NAME:-football}
    FOOTBALL_DB_USER:     ${FOOTBALL_DB_USER:-football_user}
    FOOTBALL_DB_PASSWORD: ${FOOTBALL_DB_PASSWORD:-}

    # AWS — supply real creds via .env or environment for production
    AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-testing}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-testing}
    AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-eu-west-1}
    S3_BUCKET_NAME:        ${S3_BUCKET_NAME:-football-pipeline-parquet-lake}

    # Spark
    SPARK_MASTER_URL: spark://spark-master:7077
    SPARK_JARS: >-
      /opt/spark/jars/postgresql.jar,
      /opt/spark/jars/hadoop-aws.jar,
      /opt/spark/jars/aws-java-sdk-bundle.jar

    _PIP_ADDITIONAL_REQUIREMENTS: >-
      apache-airflow-providers-postgres==5.10.2
      pyspark==3.5.1
      pyarrow==15.0.0
      confluent-kafka==2.4.0
      dbt-core==1.8.3
      dbt-postgres==1.8.3
      boto3==1.34.0
      moto[s3]==5.0.0

  volumes:
    - ./dags:/opt/airflow/dags
    - ./kafka:/opt/airflow/kafka
    - ./dbt:/opt/airflow/dbt
    - ./tests:/opt/airflow/tests
    - ./spark/jars:/opt/spark/jars
    - airflow-logs:/opt/airflow/logs

  depends_on:
    airflow-db:
      condition: service_healthy
    kafka:
      condition: service_started

services:

  # ── Airflow metadata DB ────────────────────────────────────────────────────
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── Airflow init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --firstname Admin --lastname User \
          --role Admin --email admin@example.com --password admin
    restart: "no"

  # ── Airflow webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # ── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zookeeper-data:/bitnami/zookeeper

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9093:9093"
    volumes:
      - kafka-data:/bitnami/kafka

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Spark master ───────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./spark/jars:/opt/spark/jars

  # ── Spark worker ───────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5.1
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - ./spark/jars:/opt/spark/jars

  # ── moto S3 server (local AWS mock for dev/testing) ────────────────────────
  moto-server:
    image: motoserver/moto:latest
    ports:
      - "5555:5000"
    environment:
      MOTO_PORT: "5000"

volumes:
  airflow-db-data:
  airflow-logs:
  zookeeper-data:
  kafka-data:
