version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.12
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # Delta Lake / S3
    DELTA_PATH: s3a://football-data/delta/matches
    PREDICTIONS_DELTA_PATH: s3a://football-data/delta/predictions
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-1}
    # MLflow
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_EXPERIMENT: football_outcome
    # Kafka / Streaming
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC: football_matches
    KAFKA_STARTING_OFFSETS: earliest
    STREAMING_CHECKPOINT_PATH: s3a://football-data/checkpoints/matches
    STREAMING_TRIGGER_INTERVAL: "10 seconds"
    # v11: packages required by spark-submit for the streaming job
    # Override in .env for a self-hosted Spark cluster or S3-backed jars.
    SPARK_SUBMIT_OPTIONS: >-
      --packages
      io.delta:delta-spark_2.12:3.2.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
    SPARK_SUBMIT_BIN: spark-submit
    STREAM_SCRIPT_PATH: /opt/airflow/streaming/stream_ingest.py
    # dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
    # GX
    GX_ROOT: /opt/airflow/gx
  volumes:
    - ./dags:/opt/airflow/dags
    - ./streaming:/opt/airflow/streaming
    - ./ml:/opt/airflow/ml
    - ./dbt:/opt/airflow/dbt
    - ./gx:/opt/airflow/gx
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  # -----------------------------------------------------------------------
  # Postgres (Airflow metadata + MLflow backend)
  # -----------------------------------------------------------------------
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
      - ./scripts/init_mlflow_db.sql:/docker-entrypoint-initdb.d/init_mlflow_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # -----------------------------------------------------------------------
  # Airflow
  # -----------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # -----------------------------------------------------------------------
  # MLflow tracking server
  # -----------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    env_file:
      - mlflow/mlflow.env
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@airflow-db:5432/mlflow
      --default-artifact-root s3://football-data/mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      airflow-db:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Spark (standalone, single worker — enough for local dev)
  # -----------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5.1
    environment:
      SPARK_MODE: master
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark/jars:/opt/spark/jars
      - ./streaming:/opt/airflow/streaming   # so spark-submit can find the script

  spark-worker:
    image: bitnami/spark:3.5.1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_EXTRA_CLASSPATH: /opt/spark/jars/delta-spark_2.12-3.2.0.jar:/opt/spark/jars/delta-storage-3.2.0.jar
    volumes:
      - ./spark/jars:/opt/spark/jars

  # -----------------------------------------------------------------------
  # Kafka
  # -----------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  # -----------------------------------------------------------------------
  # Moto S3 (local dev / CI)
  # -----------------------------------------------------------------------
  moto-server:
    image: motoserver/moto:latest
    ports:
      - "5555:5000"
    environment:
      MOTO_S3_CUSTOM_ENDPOINTS: "http://moto-server:5000"

volumes:
  airflow-db-data:
