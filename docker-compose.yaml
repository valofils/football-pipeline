---
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.12
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    SPARK_MASTER_URL: spark://spark-master:7077
    FOOTBALL_DB_HOST: football-db
    FOOTBALL_DB_PORT: "5432"
    FOOTBALL_DB_NAME: football
    FOOTBALL_DB_USER: football
    FOOTBALL_DB_PASS: football
    SPARK_JARS: /opt/spark-jars/postgresql-42.7.3.jar
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      pyspark==3.5.1
      psycopg2-binary==2.9.9
      pyarrow==15.0.2
      pandas==2.2.2
      dbt-core==1.8.3
      dbt-postgres==1.8.3
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./tests:/opt/airflow/tests
    - ./data:/opt/airflow/data
    - ./spark/jars:/opt/spark-jars
    - ./dbt:/opt/airflow/dbt        # NEW: dbt project mounted into Airflow containers
    - airflow-logs:/opt/airflow/logs
  depends_on: &airflow-depends
    airflow-db:
      condition: service_healthy
    football-db:
      condition: service_healthy

services:

  # ── Airflow metadata DB ───────────────────────────────────────────────────
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - airflow-db-data:/var/lib/postgresql/data

  # ── Football data DB ──────────────────────────────────────────────────────
  football-db:
    image: postgres:16
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football
      POSTGRES_DB: football
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "football"]
      interval: 5s
      retries: 5
    volumes:
      - football-db-data:/var/lib/postgresql/data

  # ── Spark standalone cluster ──────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    environment:
      SPARK_MODE: master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark/jars:/opt/bitnami/spark/jars/extra

  spark-worker:
    image: bitnami/spark:3.5.1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
    depends_on:
      - spark-master
    volumes:
      - ./spark/jars:/opt/bitnami/spark/jars/extra

  # ── Airflow init ──────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
        airflow connections add football_db \
          --conn-type postgres \
          --conn-host football-db \
          --conn-login football \
          --conn-password football \
          --conn-schema football \
          --conn-port 5432
    depends_on:
      <<: *airflow-depends

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: on-failure

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  airflow-logs:
  airflow-db-data:
  football-db-data:
