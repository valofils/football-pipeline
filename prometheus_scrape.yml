global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    pipeline: football-pipeline
    env: production

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # wire up Alertmanager if desired

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── Airflow ─────────────────────────────────────────────────────────────────
  # Requires: pip install apache-airflow-providers-prometheus
  # and AIRFLOW__METRICS__STATSD_ON=False + metrics HTTP endpoint enabled
  - job_name: airflow
    metrics_path: /metrics
    static_configs:
      - targets: [airflow-webserver:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: airflow

  # ── Kafka (JMX → kafka-exporter) ────────────────────────────────────────────
  # Uses: danielqsj/kafka-exporter
  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kafka

  # ── Kafka consumer-group lag (streaming job) ─────────────────────────────────
  # kafka-exporter exposes consumer_lag metric automatically
  - job_name: kafka_consumer_lag
    static_configs:
      - targets: [kafka-exporter:9308]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: kafka_consumergroup_lag
        action: keep

  # ── Spark (Prometheus Spark listener) ───────────────────────────────────────
  # Requires: spark.metrics.conf.*.sink.prometheus.class=...PrometheusServlet
  # and spark.ui.prometheus.enabled=true (Spark 3.0+)
  - job_name: spark
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: [spark-master:4040]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: spark-master
      - source_labels: [__address__]
        target_label: job
        replacement: spark_streaming

  # ── MLflow (custom metrics endpoint via mlflow-exporter) ────────────────────
  # Simple Flask sidecar that exposes run metrics from MLflow tracking server
  - job_name: mlflow
    static_configs:
      - targets: [mlflow-exporter:9318]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: mlflow

  # ── PostgreSQL (postgres_exporter) ──────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: postgres

  # ── Node metrics for Docker host ─────────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
