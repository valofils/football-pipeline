name: Football Data Pipeline CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: football-pipeline-airflow
  REGISTRY: ghcr.io
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/football-pipeline-airflow

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: pip install ruff black

      - name: Run ruff
        run: ruff check .

      - name: Run black --check
        run: black --check .

  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@localhost:5432/airflow
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FULL }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on non-PR)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration / Smoke Test
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start stack
        run: docker compose up -d --wait --timeout 120

      - name: Health check — Airflow
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:8080/health && break
            echo "Waiting for Airflow ($i/12)…"
            sleep 10
          done

      - name: Health check — MLflow
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:5001/health && break
            echo "Waiting for MLflow ($i/12)…"
            sleep 10
          done

      - name: Health check — Marquez API
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:5002/api/v1/namespaces && break
            echo "Waiting for Marquez ($i/12)…"
            sleep 10
          done

      - name: Health check — Prometheus
        run: |
          for i in $(seq 6 1); do
            curl -sf http://localhost:9090/-/ready && break
            echo "Waiting for Prometheus ($i/6)…"
            sleep 10
          done

      - name: Health check — Grafana
        run: |
          for i in $(seq 1 6); do
            curl -sf http://localhost:3000/api/health && break
            echo "Waiting for Grafana ($i/6)…"
            sleep 10
          done

      - name: Smoke test — POST lineage event to Marquez
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/marquez_response.json -w "%{http_code}" \
            -X POST http://localhost:5002/api/v1/lineage \
            -H "Content-Type: application/json" \
            -d '{
              "eventType": "START",
              "eventTime": "2024-01-01T00:00:00Z",
              "run": {
                "runId": "smoke-test-run-00000000-0000-0000-0000-000000000001"
              },
              "job": {
                "namespace": "football_pipeline",
                "name": "smoke_test_job"
              },
              "inputs": [],
              "outputs": [],
              "producer": "https://github.com/football-pipeline/ci"
            }')
          echo "Marquez response status: $HTTP_STATUS"
          cat /tmp/marquez_response.json
          if [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Expected 201, got $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test PASSED"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as latest
        run: |
          SHA_TAG="${{ env.IMAGE_FULL }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          docker pull "$SHA_TAG"
          docker tag  "$SHA_TAG" "${{ env.IMAGE_FULL }}:latest"
          docker push "${{ env.IMAGE_FULL }}:latest"

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Placeholder: replace with your actual deployment mechanism
          # e.g. SSH into host and run docker compose pull && docker compose up -d
          echo "Deploying ${{ env.IMAGE_FULL }}:latest to production"
          echo "DEPLOY_HOST=${DEPLOY_HOST}"
          echo "Deploy step complete (placeholder)"
