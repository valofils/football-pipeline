# marquez.yml — Marquez server configuration
# Mounted into the marquez container at /usr/src/app/marquez.yml

server:
  applicationConnectors:
    - type: http
      port: 5000
  adminConnectors:
    - type: http
      port: 5001

logging:
  level: INFO
  appenders:
    - type: console
      logFormat: "%-5p [%d{ISO8601,UTC}] %c: %m%n%rEx"

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://marquez-db:5432/marquez
  user: marquez
  password: marquez

migrateOnStartup: true

# Namespace auto-created on first event
namespace:
  defaultOwnerName: football-pipeline-team
